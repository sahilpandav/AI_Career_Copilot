{% extends "base.html" %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h2>Welcome Back 👋</h2>

        <p class="sub-text">
            Sign in to continue using <strong>AI Career Copilot</strong>.
        </p>

        <form method="POST">

            <label>Email Address</label>
            <input
                type="email"
                name="email"
                placeholder="john@example.com"
                required
            >

            <label>Password</label>
            <input
                type="password"
                name="password"
                placeholder="••••••••"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <div class="auth-links">
            <a href="#">Forgot Password?</a>
        </div>

        <p class="switch-auth">
            Don't have an account?
            <a href="/signup">Create Account</a>
        </p>

    </div>

</div>

{% endblock %}
